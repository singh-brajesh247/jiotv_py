# Example config file for JIO_tv
# All fields mentioned below are optional.

# Enable Or Disable EPG Generation. Default: false
epg = false

# Enable Or Disable Debug Mode. Default: false
debug = false

# Enable Or Disable TS Handler. While TS Handler is enabled, the server will serve the TS files directly from JioTV API. Default: false
disable_ts_handler = false

# Enable Or Disable Logout feature. Default: true
disable_logout = false

# Enable Or Disable DRM. Required for Sony and HD DASH streams. Default: true
drm = true

# Title of the webpage. Default: JIO_tv
title = ""

# Enable Or Disable URL Encryption. URL Encryption prevents hackers from injecting URLs into the server. Default: true
# If you think it is unnecessary, you can disable it. But it is recommended to enable it.
disable_url_encryption = false

# Folder path for all JIO_tv related files.
path_prefix = ""

# Proxy URL. Proxy is useful to bypass geo-restrictions and ip-restrictions for JioTV API. Default: ""
proxy = ""

# LogPath is the directory for log files. Default: ""
log_path = ""

# LogToStdout controls logging to stdout/stderr. Default: false
log_to_stdout = false

# Default categories to display on the web page without filters. Array of category IDs. Default: []
# Example: default_categories = [8, 5] # Entertainment, Movies
default_categories = []

# Default languages to display on the web page without filters. Array of language IDs. Default: []
# Example: default_languages = [1, 6] # Hindi, English
default_languages = []

# Maximum blocking request handlers used behind the ASGI server. Default: 256
asgi_worker_threads = 256

# Maximum requests allowed to be active or queued before returning HTTP 503. Default: 5000
asgi_request_queue_limit = 5000

# How long a request may wait for handler capacity before HTTP 503. Default: 5
asgi_queue_timeout_seconds = 5

# Per-request response bridge chunks buffered between worker thread and ASGI loop. Default: 64
asgi_response_queue_size = 64

# Shared channel list cache TTL in seconds. Default: 300
channels_cache_ttl = 300

# Shared rewritten HLS manifest cache TTL in seconds. Default: 3
manifest_cache_ttl = 3

# Shared media segment cache TTL in seconds. Default: 20
segment_cache_ttl = 20

# Maximum total media segment cache size in bytes. Default: 512 MiB
segment_cache_max_bytes = 536870912

# Maximum single media segment cached in bytes. Default: 8 MiB
segment_cache_item_max_bytes = 8388608
